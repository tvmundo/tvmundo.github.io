<!DOCTYPE html><html lang="pt-BR" data-theme="dark"><head>    <meta charset="UTF-8">	<!----------------------corre硯 de caracteres ini ------------------------><!-- HTML 4 --><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><!-- HTML5 --><meta charset="utf-8"/><?xml version="1.0" encoding="utf-8"?><!----------------------corre硯 de caracteres Fim ------------------------>   <!DOCTYPE html><html lang="pt-BR" data-theme="dark"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Editor de Texto</title>    <style>        :root {            --bg-primary: #0f0f1a;            --bg-secondary: #1a1a2e;            --bg-tertiary: #12122a;            --bg-input: #1e1e3a;            --bg-hover: #252545;            --text-primary: #e0e0e0;            --text-secondary: #b0b0d0;            --text-muted: #8888aa;            --text-placeholder: #4a4a6a;            --border-color: #2a2a4a;            --border-hover: #4a4a7a;            --accent-purple: #6a4db0;            --accent-green: #69f0ae;            --accent-blue: #82aaff;            --shadow: rgba(0, 0, 0, 0.5);            --transition: 0.3s;        }        [data-theme="light"] {            --bg-primary: #f4f6f8;            --bg-secondary: #ffffff;            --bg-tertiary: #f0f2f5;            --bg-input: #e9ecef;            --bg-hover: #dee2e6;            --text-primary: #1a1a2e;            --text-secondary: #495057;            --text-muted: #6c757d;            --text-placeholder: #adb5bd;            --border-color: #dee2e6;            --border-hover: #868e96;            --accent-purple: #6f42c1;            --accent-green: #28a745;            --accent-blue: #0d6efd;            --shadow: rgba(0, 0, 0, 0.12);        }        * {            margin: 0;            padding: 0;            box-sizing: border-box;            transition: background-color var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition);        }        body {            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            background: var(--bg-primary);            min-height: 100vh;            display: flex;            justify-content: center;            align-items: flex-start;            padding: 30px 15px;            color: var(--text-primary);        }        .editor-container {            width: 100%;            max-width: 860px;            background: var(--bg-secondary);            border-radius: 16px;            box-shadow: 0 20px 60px var(--shadow);            overflow: hidden;            border: 1px solid var(--border-color);        }        /* HEADER */        .editor-header {            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));            padding: 16px 22px;            border-bottom: 1px solid var(--border-color);            display: flex;            align-items: center;            justify-content: space-between;        }        .header-left { display: flex; align-items: center; gap: 12px; }        .dot { width: 13px; height: 13px; border-radius: 50%; }        .dot.red { background: #ff5f57; }        .dot.yellow { background: #ffbd2e; }        .dot.green { background: #28c840; }        .editor-header h1 {            font-size: 0.95rem;            font-weight: 500;            color: var(--text-muted);            letter-spacing: 0.5px;        }        .theme-toggle {            background: var(--bg-input);            border: 1px solid var(--border-color);            border-radius: 8px;            padding: 7px 11px;            cursor: pointer;            font-size: 1.1rem;            color: var(--text-secondary);            display: flex; align-items: center; gap: 6px;        }        .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }        /* TOOLBARS */        .toolbar, .format-toolbar, .symbol-toolbar {            background: var(--bg-tertiary);            padding: 8px 18px;            display: flex;            flex-wrap: wrap;            gap: 5px;            align-items: center;            border-bottom: 1px solid var(--border-color);        }        .format-toolbar select,        .toolbar button,        .format-toolbar button,        .symbol-toolbar button {            background: var(--bg-input);            color: var(--text-secondary);            border: 1px solid var(--border-color);            border-radius: 6px;            padding: 6px 11px;            font-size: 0.82rem;            cursor: pointer;            transition: all 0.2s ease;            display: flex;            align-items: center;            gap: 5px;            font-family: inherit;        }        .toolbar button:hover, .format-toolbar button:hover, .symbol-toolbar button:hover, .format-toolbar select:hover {            background: var(--bg-hover);            color: var(--text-primary);            border-color: var(--border-hover);            transform: translateY(-1px);            box-shadow: 0 4px 10px var(--shadow);        }        .toolbar button:active, .format-toolbar button:active, .symbol-toolbar button:active {            transform: translateY(0);        }        .format-toolbar select { padding: 5px 7px; font-size: 0.78rem; }        .format-toolbar select:focus { outline: none; border-color: var(--accent-purple); }        /* ACTIVE STATE */        .format-toolbar button.active {            background: var(--accent-purple) !important;            color: #fff !important;            border-color: var(--accent-purple) !important;            box-shadow: 0 0 0 2px rgba(106, 77, 176, 0.35);        }        .symbol-toolbar button {            width: 30px;            height: 30px;            padding: 0;            justify-content: center;            font-weight: 700;            font-size: 1rem;        }        .separator { width: 1px; height: 24px; background: var(--border-color); margin: 0 5px; }        .toolbar .btn-link { border-color: var(--accent-purple); color: #b388ff; }        .toolbar .btn-link:hover { color: #d1b3ff; border-color: #8a6ad0; }        .toolbar .btn-download { border-color: var(--accent-green); color: var(--accent-green); margin-left: auto; }        .toolbar .btn-download:hover { color: #a0ffcf; border-color: #2a9b6a; }        /* EDITOR */        .editor-area {            min-height: 420px;            max-height: 70vh;            overflow-y: auto;            padding: 25px;            outline: none;            font-size: 1rem;            line-height: 1.75;            color: var(--text-primary);            background: var(--bg-secondary);        }        .editor-area:empty::before {            content: "Comece a digitar seu texto aqui...";            color: var(--text-placeholder);            font-style: italic;            pointer-events: none;        }        .editor-area a { color: var(--accent-blue); text-decoration: underline; text-decoration-style: dashed; text-underline-offset: 3px; }        .editor-area a:hover { color: #b3d4ff; }        .editor-area h1, .editor-area h2, .editor-area h3 { color: var(--text-primary); margin: 12px 0 6px; }        .editor-area ul, .editor-area ol { padding-left: 22px; margin: 6px 0; }        .editor-area blockquote {            border-left: 3px solid var(--accent-purple);            padding-left: 14px;            margin: 8px 0;            color: var(--text-muted);            font-style: italic;            background: rgba(106, 77, 176, 0.05);            border-radius: 0 4px 4px 0;        }        .editor-area::-webkit-scrollbar { width: 7px; }        .editor-area::-webkit-scrollbar-track { background: var(--bg-tertiary); }        .editor-area::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }        .editor-area::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }        /* MODAL */        .modal-overlay {            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000;            justify-content: center; align-items: center;        }        .modal-overlay.active { display: flex; }        .modal {            background: var(--bg-secondary); border: 1px solid var(--border-color);            border-radius: 12px; padding: 26px; width: 92%; max-width: 420px;            box-shadow: 0 20px 50px var(--shadow); animation: modalIn 0.25s ease;        }        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }        .modal h2 { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }        .modal label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 5px; margin-top: 12px; }        .modal input[type="text"], .modal input[type="url"] {            width: 100%; padding: 9px 12px; background: var(--bg-input); border: 1px solid var(--border-color);            border-radius: 7px; color: var(--text-primary); font-size: 0.88rem; font-family: inherit;        }        .modal input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 2px rgba(106, 77, 176, 0.2); }        .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }        .modal-actions button {            padding: 8px 20px; border-radius: 7px; font-size: 0.82rem; cursor: pointer;            border: 1px solid var(--border-color); font-family: inherit; transition: all 0.2s ease;        }        .modal-actions .btn-cancel { background: var(--bg-tertiary); color: var(--text-muted); }        .modal-actions .btn-cancel:hover { background: var(--bg-input); color: var(--text-primary); }        .modal-actions .btn-confirm { background: linear-gradient(135deg, var(--accent-purple), #4a2d8a); color: #fff; border-color: var(--accent-purple); }        .modal-actions .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(106, 77, 176, 0.35); }        /* DOWNLOAD MENU */        .download-menu {            display: none; position: absolute; background: var(--bg-secondary); border: 1px solid var(--border-color);            border-radius: 8px; padding: 6px; box-shadow: 0 12px 30px var(--shadow);            z-index: 500; min-width: 170px; animation: fadeIn 0.2s ease;        }        .download-menu.active { display: block; }        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }        .download-menu button {            display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px;            background: transparent; border: none; color: var(--text-secondary); font-size: 0.82rem;            cursor: pointer; border-radius: 5px; transition: all 0.15s ease; font-family: inherit;        }        .download-menu button:hover { background: var(--bg-input); color: var(--text-primary); }        .download-menu button svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }        /* STATUS BAR */        .status-bar {            background: var(--bg-tertiary); padding: 7px 18px;            display: flex; justify-content: space-between; align-items: center;            border-top: 1px solid var(--border-color); font-size: 0.72rem; color: var(--text-muted);        }        /* TOAST */        .toast {            position: fixed; bottom: 25px; right: 25px; background: var(--bg-secondary);            border: 1px solid var(--accent-green); color: var(--accent-green);            padding: 10px 18px; border-radius: 8px; font-size: 0.82rem;            box-shadow: 0 8px 25px var(--shadow); transform: translateY(80px); opacity: 0;            transition: all 0.35s ease; z-index: 2000; white-space: nowrap;        }        .toast.show { transform: translateY(0); opacity: 1; }        @media (max-width: 600px) {            body { padding: 10px; }            .toolbar, .format-toolbar, .symbol-toolbar { padding: 7px 12px; }            .editor-area { padding: 18px 14px; min-height: 320px; }            .separator { display: none; }            .toolbar .btn-download { margin-left: 0; }            .editor-header h1 { display: none; }        }    </style></head><body>    <div class="editor-container">        <!-- HEADER -->        <div class="editor-header">            <div class="header-left">                <div class="dot red"></div>                <div class="dot yellow"></div>                <div class="dot green"></div>                <h1>📝 Editor de Texto Qwen</h1>            </div>            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Alternar tema">🌙</button>        </div>        <!-- FORMAT TOOLBAR -->        <div class="format-toolbar">            <select id="headingSelect" onchange="formatBlock(this.value); this.value='';">                <option value="">Bloco...</option>                <option value="p">✓ Texto Normal</option>                <option value="h1">Título 1</option>                <option value="h2">Título 2</option>                <option value="h3">Título 3</option>            </select>            <button id="btnBold" onclick="execCmd('bold')" title="Negrito"><b>N</b></button>            <button id="btnItalic" onclick="execCmd('italic')" title="Itálico"><i>I</i></button>            <button id="btnUnderline" onclick="execCmd('underline')" title="Sublinhado"><u>S</u></button>            <button id="btnStrike" onclick="execCmd('strikeThrough')" title="Tachado"><s>T</s></button>            <div class="separator"></div>            <button onclick="execCmd('justifyLeft')" title="Esquerda">⫷</button>            <button onclick="execCmd('justifyCenter')" title="Centro">⫿</button>            <button onclick="execCmd('justifyRight')" title="Direita">⫸</button>            <div class="separator"></div>            <button onclick="execCmd('insertUnorderedList')" title="Lista">• Lista</button>            <button onclick="execCmd('insertOrderedList')" title="Numerada">1. Lista</button>            <button id="btnBlockquote" onclick="toggleBlockquote()" title="Citação (clique para ativar/desativar)">❝ Citação</button>        </div>        <!-- SYMBOL TOOLBAR -->        <div class="symbol-toolbar">            <button onclick="insertSymbol('@')" title="@">@</button>            <button onclick="insertSymbol('#')" title="#">#</button>            <button onclick="insertSymbol('$')" title="$">$</button>            <button onclick="insertSymbol('%')" title="%">%</button>            <button onclick="insertSymbol('&')" title="&amp;">&</button>            <button onclick="insertSymbol('\\')" title="\">\</button>            <button onclick="insertSymbol('/')" title="/">/</button>            <button onclick="insertSymbol('?')" title="?">?</button>        </div>        <!-- MAIN TOOLBAR -->        <div class="toolbar">            <button class="btn-link" onclick="openLinkModal()" title="Inserir Link (Ctrl+K)">                <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>                Inserir Link            </button>            <button onclick="removeLinks()" title="Remover links">🔗✕</button>            <div class="separator"></div>            <button onclick="clearEditor()" title="Limpar tudo">🗑️ Limpar</button>            <div style="position: relative;">                <button class="btn-download" onclick="toggleDownloadMenu()" id="downloadBtn" title="Baixar texto">⬇️ Baixar</button>                <div class="download-menu" id="downloadMenu">                    <button onclick="downloadAs('txt')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg> Texto (.txt)</button>                    <button onclick="downloadAs('html')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg> HTML (.html)</button>                    <button onclick="downloadAs('md')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg> Markdown (.md)</button>                </div>            </div>        </div>        <!-- EDITOR -->        <div class="editor-area" id="editor" contenteditable="true" spellcheck="true"></div>        <!-- STATUS BAR -->        <div class="status-bar">            <span id="wordCount">0 palavras</span>            <span id="charCount">0 caracteres</span>        </div>    </div>    <!-- LINK MODAL -->    <div class="modal-overlay" id="linkModal">        <div class="modal">            <h2>🔗 Inserir Link</h2>            <label>Texto exibido:</label>            <input type="text" id="linkText" placeholder="Clique aqui, Saiba mais...">            <label>URL:</label>            <input type="url" id="linkUrl" placeholder="https://exemplo.com">            <div class="modal-actions">                <button class="btn-cancel" onclick="closeLinkModal()">Cancelar</button>                <button class="btn-confirm" onclick="insertLink()">Inserir</button>            </div>        </div>    </div>    <!-- TOAST -->    <div class="toast" id="toast"></div>    <script>        const editor = document.getElementById('editor');        const linkModal = document.getElementById('linkModal');        const downloadMenu = document.getElementById('downloadMenu');        let savedSelection = null;        // ===== THEME =====        function toggleTheme() {            const current = document.documentElement.getAttribute('data-theme');            const next = current === 'light' ? 'dark' : 'light';            document.documentElement.setAttribute('data-theme', next);            localStorage.setItem('editor-theme', next);            document.getElementById('themeBtn').textContent = next === 'light' ? '☀️' : '🌙';        }        const savedTheme = localStorage.getItem('editor-theme') || 'dark';        document.documentElement.setAttribute('data-theme', savedTheme);        document.getElementById('themeBtn').textContent = savedTheme === 'light' ? '☀️' : '🌙';        // ===== EXEC COMMAND =====        function execCmd(cmd, val = null) {            document.execCommand(cmd, false, val);            editor.focus();            updateCounts();        }        function formatBlock(tag) {            if (tag) document.execCommand('formatBlock', false, `<${tag.toUpperCase()}>`);            editor.focus();            updateButtonStates();        }        // ===== BLOCKQUOTE TOGGLE (CORRIGIDO) =====        function toggleBlockquote() {            const sel = window.getSelection();            if (!sel.rangeCount) return;                        let node = sel.anchorNode;            if (node.nodeType === 3) node = node.parentNode;            // Sobe até achar o bloco            let block = node;            while (block && block !== editor) {                const t = block.tagName?.toUpperCase();                if (['P', 'DIV', 'BLOCKQUOTE', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI'].includes(t)) break;                block = block.parentNode;            }            if (block && block.tagName === 'BLOCKQUOTE') {                // Desativa: converte para parágrafo                document.execCommand('formatBlock', false, '<P>');                showToast('📝 Retornou para texto normal');            } else {                // Ativa: converte para citação                document.execCommand('formatBlock', false, '<BLOCKQUOTE>');                showToast('❝ Citação ativada');            }                        editor.focus();            updateCounts();            updateButtonStates();        }        // ===== DETECTAR ESTADO DOS BOTÕES =====        function updateButtonStates() {            const cmds = { btnBold: 'bold', btnItalic: 'italic', btnUnderline: 'underline', btnStrike: 'strikeThrough' };            for (const [id, cmd] of Object.entries(cmds)) {                const btn = document.getElementById(id);                if (btn) {                    if (document.queryCommandState(cmd)) btn.classList.add('active');                    else btn.classList.remove('active');                }            }            // Blockquote            const sel = window.getSelection();            let node = sel?.anchorNode;            if (node && node.nodeType === 3) node = node.parentNode;            let block = node;            let isBq = false;            while (block && block !== editor) {                if (block.tagName === 'BLOCKQUOTE') { isBq = true; break; }                block = block.parentNode;            }            const bqBtn = document.getElementById('btnBlockquote');            if (bqBtn) isBq ? bqBtn.classList.add('active') : bqBtn.classList.remove('active');        }        document.addEventListener('selectionchange', () => {            if (document.activeElement === editor) updateButtonStates();        });        // ===== SÍMBOLOS =====        function insertSymbol(sym) {            editor.focus();            document.execCommand('insertText', false, sym);            updateCounts();        }        // ===== LINKS =====        function saveSelection() {            const sel = window.getSelection();            if (sel.rangeCount > 0) savedSelection = sel.getRangeAt(0);        }        function restoreSelection() {            if (savedSelection) {                const sel = window.getSelection();                sel.removeAllRanges();                sel.addRange(savedSelection);            }        }        function openLinkModal() {            saveSelection();            document.getElementById('linkText').value = window.getSelection().toString();            document.getElementById('linkUrl').value = '';            linkModal.classList.add('active');            setTimeout(() => (!window.getSelection().toString() ? document.getElementById('linkText').focus() : document.getElementById('linkUrl').focus()), 100);        }        function closeLinkModal() { linkModal.classList.remove('active'); editor.focus(); }        function insertLink() {            const text = document.getElementById('linkText').value.trim();            const url = document.getElementById('linkUrl').value.trim();            if (!url) return showToast('⚠️ Insira uma URL válida');            restoreSelection();            if (text) document.execCommand('insertHTML', false, `<a href="${url}" target="_blank">${text}</a> `);            else document.execCommand('createLink', false, url);            closeLinkModal(); updateCounts(); showToast('✅ Link inserido!');        }        function removeLinks() {            const links = editor.querySelectorAll('a');            if (!links.length) return showToast('ℹ️ Nenhum link encontrado');            links.forEach(a => a.parentNode.replaceChild(document.createTextNode(a.textContent), a));            updateCounts(); showToast('🔗 Links removidos');        }        // ===== DOWNLOAD =====        function toggleDownloadMenu() { downloadMenu.classList.toggle('active'); }        document.addEventListener('click', e => {            if (!e.target.closest('#downloadBtn') && !e.target.closest('#downloadMenu')) downloadMenu.classList.remove('active');        });        function downloadAs(fmt) {            downloadMenu.classList.remove('active');            const html = editor.innerHTML;            const txt = editor.innerText;            let blob, name;            if (fmt === 'txt') { blob = new Blob([txt], {type:'text/plain;charset=utf-8'}); name = 'texto.txt'; }            else if (fmt === 'html') {                blob = new Blob([`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Texto</title><style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;padding:20px;line-height:1.8}a{color:#1a73e8}blockquote{border-left:3px solid #ccc;padding-left:15px;color:#666}</style></head><body>${html}</body></html>`], {type:'text/html;charset=utf-8'});                name = 'texto.html';            }            else { blob = new Blob([htmlToMarkdown(html)], {type:'text/markdown;charset=utf-8'}); name = 'texto.md'; }            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name;            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);            showToast(`📥 "${name}" baixado!`);        }        function htmlToMarkdown(h) {            let m = h;            m = m.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n');            m = m.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n');            m = m.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n');            m = m.replace(/<(?:strong|b)[^>]*>(.*?)<\/(?:strong|b)>/gi, '**$1**');            m = m.replace(/<(?:em|i)[^>]*>(.*?)<\/(?:em|i)>/gi, '*$1*');            m = m.replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');            m = m.replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n');            m = m.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n');            m = m.replace(/<br\s*\/?>/gi, '\n');            m = m.replace(/<\/p>/gi, '\n\n');            m = m.replace(/<[^>]+>/g, '');            const t = document.createElement('textarea' owDiv.className = 'keyboard-row';            row.forEach((baseKey, keyIndex) => {                const keyButton = document.createElement('button');                keyButton.className = 'keyboard-key';                let displayKeyText;                // Tratamento de erro simples para o caso de shiftLayout não ter a chave (não deve acontecer com a correção)                const shiftKeyValue = (shiftLayout[rowIndex] && shiftLayout[rowIndex][keyIndex] !== undefined) ? shiftLayout[rowIndex][keyIndex] : baseKey;                if (shiftOn) {                    displayKeyText = shiftKeyValue;                } else {                    displayKeyText = baseKey;                }                if (baseKey.length === 1 && baseKey.match(/[a-z]/i)) {                    if (capsLockOn && !shiftOn) {                        displayKeyText = displayKeyText.toUpperCase();                    } else if (capsLockOn && shiftOn) {                        displayKeyText = displayKeyText.toLowerCase();                    }                }                keyButton.textContent = displayKeyText;                keyButton.dataset.baseKey = baseKey;                if (baseKey === "Shift" && keyIndex === 0 && row.filter(k => k === "Shift").length > 1) {                     keyButton.dataset.code = "ShiftLeft";                } else if (baseKey === "Shift") {                     keyButton.dataset.code = "ShiftRight";                } else {                     const matchingCode = Object.keys(codeToKeyMap).find(code => codeToKeyMap[code] === baseKey);                     if (matchingCode) {                         keyButton.dataset.code = matchingCode;                     }                }                const keyClass = baseKey.toLowerCase().replace(/\s+/g, '-');                // A classe para "—" será "key-—". Caracteres especiais em nomes de classes CSS são válidos, mas podem precisar de escape em seletores complexos (não é o caso aqui). Button = findKeyButtonOnVirtualKeyboard(physicalKeyCode);            if (keyButton) {                keyButton.classList.remove('active-keypress');            }    });    renderKeyboard();    searchInput.focus();  </script></body></html><!--------------------------------------------transformar o texto para minuscula----------------------------------------------->  <style>    body {      font-family: Arial, sans-serif;      padding: 20px; /* 20px */    }    .container {      margin-top: 0px; /* 20px */      max-width: 100%px;  /* 600px */    }    textarea {      width: 100%;      height: 150px; /* Increased size for better visibility */      margin-bottom: 10px;    }    button {      display: block;      margin-bottom: 10px;    }  </style>  <script>    document.addEventListener('DOMContentLoaded', function () {      const inputText = document.querySelector('#input-text');      const convertButton = document.querySelector('#convert-button');      const outputText = document.querySelector('#output-text');      convertButton.addEventListener('click', function () {        const originalText = inputText.value.trim();        if (originalText) {          let newText = '';          for (let i = 0; i < originalText.length; i++) {            const char = originalText[i]; // Get the character instead of its code            newText += char === char.toUpperCase() ? char.toLowerCase() : char.toUpperCase(); // Toggle case using toUpperCase() and toLowerCase() methods          }          outputText.textContent = 'Original: ' + originalText + '\nConverted: ' + newText;        } else {          outputText.textContent = 'Please enter or paste some text to convert.';        }});    });</script></head><body>  <h1>Text Case Converter</h1>  <div class="container">    <textarea id="input-text" placeholder="Enter or paste your uppercase text here..."></textarea>    <button id="convert-button">Convert Text Case</button>    <pre id="outpu
