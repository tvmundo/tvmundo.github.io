<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Marcadores • Organizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .breadcrumb a {
            transition: color 0.2s;
        }
        
        .breadcrumb a:hover {
            color: rgb(147 197 253);
        }
        
        .modal {
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Estilos para o iframe embed */
        #embedContainer {
            display: none;
            flex-direction: column;
        }

        #embedContainer.active {
            display: flex !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #18181b;
        }

        #itemsContainer {
            transition: opacity 0.2s;
        }

        #itemsContainer.hidden {
            display: none;
        }

        .embed-header {
            background: #18181b;
            border-bottom: 1px solid #27272a;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .embed-header input {
            flex: 1;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            color: #e4e4e7;
            font-size: 0.875rem;
        }

        .embed-header input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .embed-header button {
            background: #27272a;
            border: none;
            color: #e4e4e7;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .embed-header button:hover {
            background: #3f3f46;
        }

        .embed-header button.danger:hover {
            background: #dc2626;
        }

        #embedFrame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        .embed-warning {
            background: #fef3c7;
            color: #92400e;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            text-align: center;
            border-bottom: 1px solid #fcd34d;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="flex flex-col min-h-screen">
        <!-- HEADER (AGORA ROLA COM A PÁGINA) -->
        <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <i class="fa-solid fa-bookmark text-3xl text-blue-500"></i>
                    <h1 class="text-2xl font-semibold tracking-tight">Meus Marcadores</h1>
                </div>
            </div>

            <div class="flex-1 max-w-md mx-8">
                <div class="relative">
                    <input id="searchInput" 
                           type="text" 
                           placeholder="Buscar marcadores ou pastas..." 
                           class="w-full bg-zinc-800 border border-zinc-700 focus:border-blue-500 focus:outline-none rounded-2xl py-3 px-5 pl-12 text-sm"
                           onkeyup="filterItems()">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-500"></i>
                </div>
            </div>

            <div class="flex items-center gap-x-3">
                <button onclick="addFolderPrompt()" 
                        class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 transition-colors px-6 py-3 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-folder-plus"></i>
                    <span>Nova Pasta</span>
                </button>

                <button onclick="addBookmarkPrompt()" 
                        class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-500 transition-colors px-6 py-3 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-plus"></i>
                    <span>Novo Marcador</span>
                </button>

                <div class="w-px h-8 bg-zinc-700 mx-2"></div>

                <button onclick="exportData()" 
                        class="p-3 hover:bg-zinc-800 rounded-2xl transition-colors" title="Exportar JSON">
                    <i class="fa-solid fa-download"></i>
                </button>
                <button onclick="importDataPrompt()" 
                        class="p-3 hover:bg-zinc-800 rounded-2xl transition-colors" title="Importar JSON">
                    <i class="fa-solid fa-upload"></i>
                </button>
            </div>
        </header>

        <!-- BREADCRUMB + CONTENT -->
        <div class="flex flex-col">
            <!-- Breadcrumb -->
            <div id="breadcrumb" 
                 class="breadcrumb bg-zinc-900 border-b border-zinc-800 px-8 py-3 flex items-center gap-x-2 text-sm text-zinc-400 overflow-x-auto whitespace-nowrap sticky top-[73px] z-30">
                <!-- JS preenche -->
            </div>

            <!-- Items Grid (AGORA COM SCROLL NATURAL DA PÁGINA) -->
            <div id="itemsContainer" class="p-8 bg-zinc-950">
                <div id="itemsGrid" 
                     class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6">
                    <!-- Cards gerados pelo JS -->
                </div>
            </div>

            <!-- Embed Container (oculto por padrão - overlay fixo quando ativo) -->
            <div id="embedContainer">
                <div class="embed-warning">
                    <!---<i class="fa-solid fa-triangle-exclamation mr-1"></i>
                    Alguns sites bloqueiam incorporação via iframe. Se não carregar, use o botão "Abrir em nova aba".--->
                </div>
                <div class="embed-header">
                    <button onclick="goBackToList()" title="Voltar para marcadores">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span>Voltar</span>
                    </button>
                    <input type="text" id="embedUrlDisplay" readonly onclick="this.select()">
                    <button onclick="openInNewTab()" title="Abrir em nova aba">
                        <i class="fa-solid fa-up-right-from-square"></i>
                        <span>Nova Aba</span>
                    </button>
                    <button onclick="reloadEmbed()" title="Recarregar">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <button class="danger" onclick="closeEmbed()" title="Fechar">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <iframe id="embedFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
            </div>
        </div>

        <!-- FOOTER STATUS -->
        <footer class="bg-zinc-900 border-t border-zinc-800 px-8 py-3 text-xs text-zinc-500 flex items-center justify-between mt-auto">
            <div>
                Dados salvos automaticamente no navegador • 
                <span onclick="resetAllData()" class="cursor-pointer underline hover:text-red-400">Resetar tudo</span>
            </div>
            <div class="flex items-center gap-x-5 text-xs">
                <div onclick="showHelp()" class="cursor-pointer hover:text-zinc-300 flex items-center gap-x-1">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>Ajuda</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- TOAST -->
    <div id="toast" 
         class="hidden fixed bottom-6 right-6 bg-zinc-800 border border-zinc-700 text-white px-6 py-3 rounded-3xl shadow-2xl flex items-center gap-x-3 z-50">
        <i id="toastIcon" class="fa-solid"></i>
        <span id="toastMessage" class="text-sm"></span>
    </div>

    <script>
        // ====================== CONFIGURAÇÃO ======================
        let data = {
            id: "root",
            name: "Meus Marcadores",
            type: "folder",
            children: []
        }
        let currentPathIds = ["root"]
        let searchTerm = ""
        let currentEmbedUrl = ""

        // ====================== HELPERS ======================
        function generateId() {
            return 'id-' + Date.now().toString(36) + Math.random().toString(36).substring(2, 9)
        }

        function findNode(id, node = data) {
            if (node.id === id) return node
            if (node.children) {
                for (let child of node.children) {
                    const found = findNode(id, child)
                    if (found) return found
                }
            }
            return null
        }

        function findParentAndIndex(id, node = data, parent = null) {
            if (!node.children) return null
            for (let i = 0; i < node.children.length; i++) {
                if (node.children[i].id === id) {
                    return { parent: node, index: i }
                }
                const found = findParentAndIndex(id, node.children[i], node)
                if (found) return found
            }
            return null
        }

        function getCurrentNode() {
            let node = data
            for (let i = 1; i < currentPathIds.length; i++) {
                const child = node.children.find(c => c.id === currentPathIds[i])
                if (!child) break
                node = child
            }
            return node
        }

        function getBreadcrumbPath() {
            const path = []
            let node = data
            path.push({ id: "root", name: data.name })
            
            for (let i = 1; i < currentPathIds.length; i++) {
                const child = node.children.find(c => c.id === currentPathIds[i])
                if (!child) break
                path.push({ id: currentPathIds[i], name: child.name })
                node = child
            }
            return path
        }

        function saveData() {
            localStorage.setItem("bookmarkData", JSON.stringify(data))
        }

        function loadData() {
            const saved = localStorage.getItem("bookmarkData")
            if (saved) {
                data = JSON.parse(saved)
            } else {
                // Dados de exemplo para começar rápido
                data.children = [
                    {
                        id: generateId(),
                        name: "Google",
                        type: "bookmark",
                        url: "https://google.com"
                    },
                    {
                        id: generateId(),
                        name: "YouTube",
                        type: "bookmark",
                        url: "https://youtube.com"
                    },
                    {
                        id: generateId(),
                        name: "Tecnologia",
                        type: "folder",
                        children: [
                            {
                                id: generateId(),
                                name: "xAI",
                                type: "bookmark",
                                url: "https://x.ai"
                            },
                            {
                                id: generateId(),
                                name: "GitHub",
                                type: "bookmark",
                                url: "https://github.com"
                            }
                        ]
                    }
                ]
                saveData()
            }
        }

        // ====================== RENDERIZAÇÃO ======================
        function renderBreadcrumb() {
            const container = document.getElementById("breadcrumb")
            container.innerHTML = ""
            
            const path = getBreadcrumbPath()
            
            path.forEach((item, index) => {
                const link = document.createElement("a")
                link.href = "#"
                link.textContent = item.name
                link.className = index === path.length - 1 
                    ? "text-white font-medium cursor-default" 
                    : "hover:text-blue-400 transition-colors"
                link.onclick = (e) => {
                    e.preventDefault()
                    if (index < path.length - 1) {
                        currentPathIds = currentPathIds.slice(0, index + 1)
                        renderAll()
                    }
                }
                container.appendChild(link)
                
                if (index < path.length - 1) {
                    const separator = document.createElement("span")
                    separator.innerHTML = `<i class="fa-solid fa-chevron-right mx-3 text-xs"></i>`
                    container.appendChild(separator)
                }
            })
        }

        function renderItems() {
            const current = getCurrentNode()
            const container = document.getElementById("itemsGrid")
            container.innerHTML = ""

            const term = searchTerm.toLowerCase()
            const filtered = current.children.filter(item => 
                item.name.toLowerCase().includes(term)
            )

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="fa-solid fa-folder-open text-6xl text-zinc-700 mb-4"></i>
                        <p class="text-zinc-500">Nenhum item encontrado</p>
                    </div>
                `
                return
            }

            filtered.forEach(item => {
                const card = document.createElement("div")
                card.className = `card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 group cursor-pointer`

                if (item.type === "folder") {
                    card.innerHTML = `
                        <div class="flex flex-col items-center text-center">
                            <div class="w-20 h-20 bg-amber-500/10 rounded-2xl flex items-center justify-center text-5xl mb-4 group-hover:scale-110 transition-transform">📁</div>
                            <p class="font-medium text-lg text-white">${item.name}</p>
                            <p class="text-xs text-zinc-500 mt-1">${item.children ? item.children.length : 0} itens</p>
                        </div>
                    `
                    card.onclick = (e) => {
                        if (!e.target.closest('.actions')) {
                            currentPathIds.push(item.id)
                            renderAll()
                        }
                    }
                } else {
                    const domain = item.url ? new URL(item.url).hostname : ''
                    card.innerHTML = `
                        <div class="flex flex-col items-center text-center">
                            <img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}" 
                                 onerror="this.src='https://via.placeholder.com/80/27272a/71717a?text=🔗'"
                                 class="w-20 h-20 rounded-2xl mb-4 shadow-inner object-contain bg-zinc-800 p-2">
                            <p class="font-medium text-lg text-white">${item.name}</p>
                            <p class="text-[10px] text-zinc-500 truncate max-w-full mt-1">${item.url}</p>
                        </div>
                    `
                    card.onclick = (e) => {
                        if (!e.target.closest('.actions')) {
                            openEmbed(item.url)
                        }
                    }
                }

                // Botões de ação
                const actions = document.createElement("div")
                actions.className = "actions absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-all"
                actions.innerHTML = `
                    <button onclick="editItem('${item.id}'); event.stopImmediatePropagation()" 
                            class="bg-zinc-800 hover:bg-blue-600 w-8 h-8 rounded-2xl flex items-center justify-center text-xs">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button onclick="deleteItem('${item.id}'); event.stopImmediatePropagation()" 
                            class="bg-zinc-800 hover:bg-red-600 w-8 h-8 rounded-2xl flex items-center justify-center text-xs">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `
                card.style.position = "relative"
                card.appendChild(actions)
                container.appendChild(card)
            })
        }

        function renderAll() {
            renderBreadcrumb()
            renderItems()
        }

        function filterItems() {
            searchTerm = document.getElementById("searchInput").value
            renderItems()
        }

        // ====================== EMBED / IFRAME ======================
        function openEmbed(url) {
            if (!url) return
            
            currentEmbedUrl = url
            
            // Mostra o container de embed em overlay fixo
            const embedContainer = document.getElementById("embedContainer")
            embedContainer.classList.add("active")
            
            // Esconde a lista de itens
            document.getElementById("itemsContainer").classList.add("hidden")
            
            // Atualiza o campo de URL
            document.getElementById("embedUrlDisplay").value = url
            
            // Carrega no iframe
            loadEmbedFrame(url)
        }

        function loadEmbedFrame(url) {
            const iframe = document.getElementById("embedFrame")
            iframe.src = url
        }

        function goBackToList() {
            const embedContainer = document.getElementById("embedContainer")
            embedContainer.classList.remove("active")
            
            document.getElementById("itemsContainer").classList.remove("hidden")
            document.getElementById("embedFrame").src = "about:blank"
            currentEmbedUrl = ""
        }

        function closeEmbed() {
            goBackToList()
        }

        function reloadEmbed() {
            if (currentEmbedUrl) {
                loadEmbedFrame(currentEmbedUrl)
                showToast("Recarregando...", "fa-rotate-right")
            }
        }

        function openInNewTab() {
            if (currentEmbedUrl) {
                window.open(currentEmbedUrl, "_blank")
            }
        }

        // ====================== AÇÕES ======================
        function addFolderPrompt() {
            const name = prompt("Nome da nova pasta:", "Nova Pasta")
            if (!name || !name.trim()) return
            
            const current = getCurrentNode()
            const newFolder = {
                id: generateId(),
                name: name.trim(),
                type: "folder",
                children: []
            }
            current.children.push(newFolder)
            saveData()
            renderAll()
            showToast("Pasta criada!", "fa-folder-plus")
        }

        function addBookmarkPrompt() {
            const name = prompt("Nome do marcador:")
            if (!name || !name.trim()) return
            
            let url = prompt("URL completa (comece com https://):", "https://")
            if (!url || !url.trim()) return
            if (!url.startsWith("http")) url = "https://" + url
            
            const current = getCurrentNode()
            const newBookmark = {
                id: generateId(),
                name: name.trim(),
                type: "bookmark",
                url: url.trim()
            }
            current.children.push(newBookmark)
            saveData()
            renderAll()
            showToast("Marcador adicionado!", "fa-link")
        }

        function editItem(id) {
            const item = findNode(id)
            if (!item) return

            if (item.type === "folder") {
                const newName = prompt("Novo nome da pasta:", item.name)
                if (newName && newName.trim() && newName.trim() !== item.name) {
                    item.name = newName.trim()
                    saveData()
                    renderAll()
                    showToast("Pasta renomeada", "fa-edit")
                }
            } else {
                const newName = prompt("Novo nome:", item.name)
                if (!newName) return
                
                let newUrl = prompt("Nova URL:", item.url)
                if (!newUrl) return
                
                if (!newUrl.startsWith("http")) newUrl = "https://" + newUrl
                
                if (newName.trim() !== item.name || newUrl.trim() !== item.url) {
                    item.name = newName.trim()
                    item.url = newUrl.trim()
                    saveData()
                    renderAll()
                    showToast("Marcador atualizado", "fa-edit")
                }
            }
        }

        function deleteItem(id) {
            if (!confirm("Excluir este item permanentemente?")) return
            
            const result = findParentAndIndex(id)
            if (result) {
                result.parent.children.splice(result.index, 1)
                saveData()
                renderAll()
                showToast("Item excluído", "fa-trash")
            }
        }

        // ====================== IMPORT / EXPORT ======================
        function exportData() {
            const jsonStr = JSON.stringify(data, null, 2)
            const blob = new Blob([jsonStr], { type: "application/json" })
            const url = URL.createObjectURL(blob)
            const a = document.createElement("a")
            a.href = url
            a.download = "meus-marcadores-backup.json"
            a.click()
            URL.revokeObjectURL(url)
            showToast("Backup baixado!", "fa-download")
        }

        function importDataPrompt() {
            const input = document.createElement("input")
            input.type = "file"
            input.accept = ".json"
            input.onchange = e => {
                const file = e.target.files[0]
                if (!file) return
                
                const reader = new FileReader()
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result)
                        if (imported.id === "root" && imported.type === "folder") {
                            if (confirm("Importar este arquivo? Isso substituirá todos os seus marcadores atuais.")) {
                                data = imported
                                currentPathIds = ["root"]
                                saveData()
                                renderAll()
                                showToast("Importação concluída com sucesso!", "fa-upload")
                            }
                        } else {
                            alert("Arquivo inválido. Deve ser um backup do gerenciador.")
                        }
                    } catch (err) {
                        alert("Erro ao ler o arquivo JSON.")
                    }
                }
                reader.readAsText(file)
            }
            input.click()
        }

        function resetAllData() {
            if (confirm("⚠️ Apagar TODOS os marcadores e pastas? Esta ação não pode ser desfeita.")) {
                localStorage.removeItem("bookmarkData")
                location.reload()
            }
        }

        // ====================== TOAST ======================
        function showToast(message, icon = "fa-check") {
            const toast = document.getElementById("toast")
            document.getElementById("toastIcon").className = `fa-solid ${icon} text-emerald-400`
            document.getElementById("toastMessage").textContent = message
            toast.classList.remove("hidden")
            toast.style.transform = "translateY(0)"
            
            setTimeout(() => {
                toast.style.transform = "translateY(100px)"
                setTimeout(() => {
                    toast.classList.add("hidden")
                }, 300)
            }, 3000)
        }

        function showHelp() {
            alert("✅ Como usar:\n\n" +
                  "• Clique nas pastas para entrar\n" +
                  "• Clique nos marcadores para abrir INCORPORADO na mesma página\n" +
                  "• Use 'Voltar' para retornar à lista de marcadores\n" +
                  "• Use 'Nova Aba' se o site não carregar no iframe\n" +
                  "• Hover nos cards → botões de editar/excluir\n" +
                  "• Tudo é salvo automaticamente no seu navegador\n\n" +
                  "⚠️ Alguns sites (Google, Facebook, etc.) bloqueiam incorporação por segurança.\n\n" +
                  "Divirta-se organizando seus sites! 🚀")
        }

        // ====================== INICIALIZAÇÃO ======================
        window.onload = function() {
            loadData()
            renderAll()
            
            // Atalho de teclado
            document.addEventListener("keydown", (e) => {
                if (e.key === "/" && document.getElementById("searchInput") !== document.activeElement) {
                    e.preventDefault()
                    document.getElementById("searchInput").focus()
                }
                // ESC para voltar da visualização embed
                if (e.key === "Escape" && document.getElementById("embedContainer").classList.contains("active")) {
                    goBackToList()
                }
            })
            
            showToast("Bem-vindo ao seu gerenciador!", "fa-bookmark")
        }
    </script>
</body>
</html>
